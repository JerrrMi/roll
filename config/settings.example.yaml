# Binance COIN-M Futures — 示例配置（复制为 settings.yaml 后修改）
# 默认 Testnet；切换实盘请修改 rest_base 并确认风险。

environment: testnet

# API 密钥文件（复制 config/secrets/*.env.example → config/secrets/*.env，勿提交 .env）
secrets:
  file: "./config/secrets/testnet.env"

binance:
  # 官方 Testnet（COIN-M 与 USD-M 共用该 host；路径区分 /dapi vs /fapi）
  rest_base: "https://testnet.binancefuture.com"
  coin_m_prefix: "/dapi/v1"
  # 实盘示例（勿在 Testnet 任务中误用）
  # rest_base: "https://dapi.binance.com"
  # coin_m_prefix: "/dapi/v1"
  recv_window_ms: 5000

# 人类可读资产代码；运行时需通过 exchangeInfo 映射到实际 COIN-M symbol（实现于后续阶段）
candidates:
  - DOGE
  - AVAX
  - BTC
  - SHIB
  - WIF
  - PEPE
  - TON
  - HYPE

# 趋势模型时间周期（占位，与 plan 文档一致）
timeframes:
  - "15m"
  - "1h"
  - "4h"

# 策略主循环（python -m main run-loop）：默认 dry-run（不下单）。
# Testnet 自动下单须同时：CLI `--no-dry-run` + 下方 testnet_signed_orders_enabled: true + 密钥文件或 BINANCE_*。
strategy:
  # 安全开关：默认 false；仅在为 Testnet 验收真实挂单时改为 true
  testnet_signed_orders_enabled: false
  # 实盘 signed 自动交易：默认 false；当前程序未接入实盘 REST 下单，切勿仅凭此项误以为已开实盘
  live_trading_enabled: false
  loop_interval_sec: 120
  klines_limit: 600
  min_monitor_symbols: 3
  dry_run_equity: 10000
  initial_leverage: 25
  stop_adverse_fraction: 0.05
  kelly_p: 0.55
  kelly_b: 1.2
  # 可选：追踪 STOP（仍需满足初始底价 stop_adverse_fraction）；自动交易时需与 binance.rest_base 同源行情
  # trail_stop_fraction: 0.02
  # Live 模式下 public_rest_base 必须与 binance.rest_base 完全一致；dry-run-only 可看实盘公共行情：
  # public_rest_base: "https://dapi.binance.com"

# 趋势评分模型默认值见代码 `TrendModelParams`；离线验收：
#   conda activate roll-env
#   python -m main trend-offline --symbol DOGEUSD_PERP --limit 600

logging:
  level: INFO
  structured: true

state:
  # MVP：交易锁与 reconcile 结果以 JSON 落盘。
  # 若仍为 sqlite（尚未实现），reconcile-state 将把路径改写为同名 .json 旁写。
  backend: sqlite
  path: "./data/roll_state.sqlite"
