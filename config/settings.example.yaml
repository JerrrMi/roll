# Binance USD-M Futures — 通用示例
# 3.0 推荐按环境拆分，请优先使用：
#   config/settings.testnet.example.yaml → config/settings.testnet.yaml
#   config/settings.live.example.yaml   → config/settings.live.yaml
# 详见 README「配置文件」。

environment: testnet

secrets:
  file: "./config/secrets/testnet.env"

binance:
  product: "usdm"
  # 官方 Futures Testnet（USD-M；路径须用 /fapi/v1）
  rest_base: "https://testnet.binancefuture.com"
  api_prefix: "/fapi/v1"
  # 实盘 USD-M 示例（勿在 Testnet 任务中误用）
  # rest_base: "https://fapi.binance.com"
  # api_prefix: "/fapi/v1"
  recv_window_ms: 5000
  # 逐仓 ISOLATED / 全仓 CROSSED；apply_margin_type=true 时在无持仓冲突下自动 POST /marginType
  margin_type: CROSSED
  apply_margin_type: false

# 人类可读资产代码；运行时需通过 USD-M exchangeInfo 映射到 USDT 永续 symbol（如 DOGEUSDT）
candidates:
  - DOGE
  - AVAX
  - BTC
  - ETH
  - SHIB
  - WIF
  - PEPE
  - TON
  - HYPE

# 趋势模型时间周期（占位，与 plan 文档一致）
timeframes:
  - "15m"
  - "1h"
  - "4h"

# 策略主循环（python -m main run-loop）：默认 dry-run（不下单）。
# Testnet 自动下单须同时：CLI `--no-dry-run` + 下方 testnet_signed_orders_enabled: true + 密钥文件或 BINANCE_*。
strategy:
  # 安全开关：默认 false；仅在为 Testnet 验收真实挂单时改为 true
  testnet_signed_orders_enabled: false
  # 实盘 signed 自动交易：默认 false；须完整审查配置、密钥权限与对账结果后才可改为 true
  live_trading_enabled: false
  loop_interval_sec: 120
  klines_limit: 600
  min_monitor_symbols: 3
  dry_run_equity: 10000
  initial_leverage: 25
  stop_adverse_fraction: 0.05
  kelly_p: 0.55
  kelly_b: 1.2
  # 滚仓：每轮最多浮盈加仓次数（不含首次开仓）；加仓前须正浮盈且趋势仍达 long/short_threshold
  max_add_per_round: 3
  min_unrealized_profit_fraction: 0.01
  # USD-M 推荐保护止损（固定底价 + 追踪 + ATR 取最保守）
  trail_stop_fraction: 0.02
  atr_stop_k: 1.5
  atr_period: 14
  atr_interval: "15m"
  max_hold_hours: 48
  # Live 模式下 public_rest_base 必须与 binance.rest_base 完全一致；dry-run-only 可看实盘公共行情：
  # public_rest_base: "https://fapi.binance.com"

# 账户级风控（live / 回测共用；未配置时使用 risk.py 默认值）
risk:
  max_single_loss_fraction: 0.02
  max_position_fraction: 0.15
  max_drawdown_fraction: 0.15
  max_daily_loss_fraction: 0.05
  max_consecutive_losses: 3
  cooldown_seconds: 3600
  kelly_variant: HALF

# 趋势退出：同向 score 低于 exit_threshold 时平仓（弱于开仓 long/short_threshold）
trend_model:
  exit_threshold: 0.35

# 趋势评分模型默认值见代码 `TrendModelParams`；离线验收：
#   conda activate roll-env
#   python -m main trend-offline --symbol DOGEUSDT --limit 600

logging:
  level: INFO
  structured: true

state:
  backend: json
  path: "./data/roll_state_testnet.json"
