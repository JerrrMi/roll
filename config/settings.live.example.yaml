# Binance USD-M Futures — 实盘 live 示例配置（真实资金风险）
# 复制为本地配置（勿提交 Git）：
#   cp config/settings.live.example.yaml config/settings/live.yaml
# 配合密钥：cp config/secrets/live.env.example config/secrets/live.env
#
# 警告：live 与 Testnet 必须使用不同的 secrets.file 与 state.path，禁止混用。

environment: live

secrets:
  file: "./config/secrets/live.env"

binance:
  product: "usdm"
  rest_base: "https://fapi.binance.com"
  api_prefix: "/fapi/v1"
  recv_window_ms: 5000

candidates:
  - DOGE
  - AVAX
  - BTC
  - SHIB
  - WIF
  - PEPE
  - TON
  - HYPE

timeframes:
  - "15m"
  - "1h"
  - "4h"

strategy:
  testnet_signed_orders_enabled: false
  # 默认 false：仅在你已完整审查本文件、密钥权限、对账结果与风险参数后，才可改为 true。
  # 启用 live signed 自动交易还需：environment=live、rest_base=https://fapi.binance.com、
  # api_prefix=/fapi/v1、CLI --no-dry-run、live 专用 secrets/state，以及启动前 reconcile-state（见 README）。
  live_trading_enabled: false
  # 首次 live signed 单轮验收可设为 min_market（见 settings.live.minimal-funds.example.yaml）
  # open_quantity_mode: min_market
  loop_interval_sec: 120
  klines_limit: 600
  min_monitor_symbols: 3
  dry_run_equity: 10000
  initial_leverage: 25
  stop_adverse_fraction: 0.05
  kelly_p: 0.55
  kelly_b: 1.2
  # 滚仓：每轮最多浮盈加仓次数（不含首次开仓）；加仓前须正浮盈且趋势仍达 long/short_threshold
  max_add_per_round: 3
  # min_unrealized_profit_fraction: 0.01
  # 可选：追踪 STOP（仍需满足初始底价 stop_adverse_fraction）；自动交易时需与 binance.rest_base 同源行情
  # trail_stop_fraction: 0.02

# 账户级风控（live / 回测共用；未配置时使用 risk.py 默认值）
risk:
  max_single_loss_fraction: 0.02
  max_position_fraction: 0.15
  max_drawdown_fraction: 0.15
  max_daily_loss_fraction: 0.05
  max_consecutive_losses: 3
  cooldown_seconds: 3600
  kelly_variant: HALF

# 趋势退出：同向 score 低于 exit_threshold 时平仓（弱于开仓 long/short_threshold）
trend_model:
  exit_threshold: 0.35
  # Live 模式下 public_rest_base 必须与 binance.rest_base 完全一致；dry-run-only 可看实盘公共行情：
  # public_rest_base: "https://fapi.binance.com"

logging:
  level: INFO
  structured: true

state:
  backend: json
  path: "./data/roll_state_live.json"
