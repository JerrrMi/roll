# Binance USD-M Futures — Testnet 自动交易示例配置
# 复制为本地配置（勿提交 Git）：
#   cp config/settings.testnet.example.yaml config/settings.testnet.yaml
# 配合密钥：cp config/secrets/testnet.env.example config/secrets/testnet.env

environment: testnet

secrets:
  file: "./config/secrets/testnet.env"

binance:
  product: "usdm"
  rest_base: "https://testnet.binancefuture.com"
  api_prefix: "/fapi/v1"
  recv_window_ms: 5000
  margin_type: CROSSED
  apply_margin_type: false

candidates:
  - DOGE
  - AVAX
  - BTC
  - ETH
  - SHIB
  - WIF
  - PEPE
  - TON
  - HYPE

timeframes:
  - "15m"
  - "1h"
  - "4h"

strategy:
  # Testnet signed 自动下单：须 CLI --no-dry-run 且本项为 true，且 rest_base 为 Testnet host
  testnet_signed_orders_enabled: false
  live_trading_enabled: false
  loop_interval_sec: 120
  klines_limit: 600
  min_monitor_symbols: 3
  dry_run_equity: 10000
  initial_leverage: 25
  stop_adverse_fraction: 0.05
  kelly_p: 0.55
  kelly_b: 1.2
  max_add_per_round: 3
  min_unrealized_profit_fraction: 0.01
  trail_stop_fraction: 0.02
  atr_stop_k: 1.5
  atr_period: 14
  atr_interval: "15m"
  max_hold_hours: 48
  # Testnet signed 验收可用最小数量：见 config/settings.testnet.minimal-funds.example.yaml
  # open_quantity_mode: risk   # 或 min_market（仅验收）
  # dry-run 时若 Testnet 候选不足，可仅读行情使用 USD-M 实盘公共 REST（勿与 Testnet signed 混用）：
  # public_rest_base: "https://fapi.binance.com"

risk:
  max_single_loss_fraction: 0.02
  max_position_fraction: 0.15
  max_drawdown_fraction: 0.15
  max_daily_loss_fraction: 0.05
  max_consecutive_losses: 3
  cooldown_seconds: 3600
  kelly_variant: HALF

trend_model:
  exit_threshold: 0.35

logging:
  level: INFO
  structured: true

state:
  backend: json
  path: "./data/roll_state_testnet.json"
